<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Confidence Coaching PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f5f7fb; padding:10px; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.15); margin-bottom:20px; }
        input, select { width:100%; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; }
        button { padding:10px; cursor:pointer; background:#0d6efd; color:white; border:none; border-radius:5px; margin:2px; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { border:1px solid #ddd; padding:8px; text-align:center; }
        #idCard { width:300px; padding:20px; background:white; border:2px solid #0d6efd; display:none; }
    </style>
</head>
<body>

<div class="card">
    <h2>নতুন শিক্ষার্থী যোগ</h2>
    <form id="studentForm">
        <input type="text" id="name" placeholder="নাম" required>
        <input type="text" id="father" placeholder="পিতার নাম">
        <input type="text" id="mobile" placeholder="মোবাইল">
        <input type="file" id="imgInput" accept="image/*">
        <button type="submit">সংরক্ষণ করুন</button>
    </form>
</div>

<div class="card">
    <h2>শিক্ষার্থী তালিকা</h2>
    <table id="studentTable"></table>
</div>

<div id="idCard">
    <h3 id="cardName"></h3>
    <img id="cardImg" width="100">
    <p>মোবাইল: <span id="cardMobile"></span></p>
    <div id="cardMonths"></div>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

document.getElementById("studentForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const file = document.getElementById("imgInput").files[0];
    const reader = new FileReader();
    reader.onload = function(event) {
        students.push({
            name: document.getElementById("name").value,
            father: document.getElementById("father").value,
            mobile: document.getElementById("mobile").value,
            img: event.target.result,
            fees: { "জানুয়ারি":"Due", "ফেব্রুয়ারি":"Due", "মার্চ":"Due", "এপ্রিল":"Due", "মে":"Due", "জুন":"Due", "জুলাই":"Due", "আগস্ট":"Due", "সেপ্টেম্বর":"Due", "অক্টোবর":"Due", "নভেম্বর":"Due", "ডিসেম্বর":"Due" }
        });
        localStorage.setItem("students", JSON.stringify(students));
        renderTable();
    };
    reader.readAsDataURL(file);
});

function renderTable() {
    const table = document.getElementById("studentTable");
    table.innerHTML = `<tr><th>নাম</th><th>অ্যাকশন</th></tr>`;
    students.forEach((s, i) => {
        table.innerHTML += `<tr><td>${s.name}</td>
        <td><button onclick="viewStudent(${i})">View/ID Card</button><button onclick="deleteStudent(${i})">Del</button></td></tr>`;
    });
}

function viewStudent(i) {
    let s = students[i];
    document.getElementById("cardName").innerText = s.name;
    document.getElementById("cardImg").src = s.img;
    document.getElementById("cardMobile").innerText = s.mobile;
    let mDiv = document.getElementById("cardMonths");
    mDiv.innerHTML = "<h4>মাসিক পেমেন্ট:</h4>";
    for(let m in s.fees) {
        mDiv.innerHTML += `<button onclick="toggleFee(${i}, '${m}')" style="background:${s.fees[m]=='Paid'?'green':'red'}">${m}: ${s.fees[m]}</button>`;
    }
    document.getElementById("idCard").style.display = "block";
    
    // ডাউনলোড অপশন
    setTimeout(() => {
        html2pdf().from(document.getElementById("idCard")).save(s.name + "_ID_Card.pdf");
        document.getElementById("idCard").style.display = "none";
    }, 500);
}

function toggleFee(i, month) {
    students[i].fees[month] = students[i].fees[month] == "Paid" ? "Due" : "Paid";
    localStorage.setItem("students", JSON.stringify(students));
    viewStudent(i); // আপডেট দেখাতে আবার কল
}

function deleteStudent(i) {
    students.splice(i, 1);
    localStorage.setItem("students", JSON.stringify(students));
    renderTable();
}

renderTable();
</script>
</body>
    </html>
