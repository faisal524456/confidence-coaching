<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Confidence Coaching Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f5f7fb; }
        header { background:#0d6efd; color:white; padding:20px; text-align:center; }
        nav { background:#084298; display:flex; justify-content:center; }
        nav a { color:white; padding:15px; text-decoration:none; cursor:pointer; }
        .container { width:95%; margin:20px auto; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.15); margin-bottom:20px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
        .box { background:#0d6efd; color:white; padding:20px; border-radius:10px; text-align:center; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        th, td { border:1px solid #ddd; padding:10px; text-align:center; }
        th { background:#0d6efd; color:white; }
        .record-modal { display:none; position:fixed; top:5%; left:10%; width:80%; height:80%; overflow-y:auto; background:white; padding:20px; border:2px solid #0d6efd; z-index:1000; }
    </style>
</head>
<body>

<header><h1>Confidence Coaching Management System</h1></header>
<nav>
    <a onclick="showSection('dashboardSection')">Dashboard</a>
    <a onclick="showSection('studentsSection')">Students</a>
</nav>

<div class="container">
    <div id="dashboardSection" class="section">
        <div class="grid">
            <div class="box"><h2>Total Students</h2><h1 id="totalStudents">0</h1></div>
            <div class="box"><h2>Collection</h2><h1 id="totalCollection">0 ৳</h1></div>
        </div>
    </div>

    <div id="studentsSection" class="section" style="display:block;">
        <div class="card">
            <h2>শিক্ষার্থী যোগ করুন</h2>
            <form id="studentForm">
                <input type="text" id="name" placeholder="নাম" required style="width:100%; padding:10px; margin:5px 0;">
                <input type="text" id="father" placeholder="পিতার নাম" style="width:100%; padding:10px; margin:5px 0;">
                <input type="text" id="mobile" placeholder="মোবাইল" style="width:100%; padding:10px; margin:5px 0;">
                <input type="number" id="fee" placeholder="বেতন" style="width:100%; padding:10px; margin:5px 0;">
                <button type="submit" style="padding:10px; width:100%;">সংরক্ষণ</button>
            </form>
            <table id="studentTable"></table>
        </div>
    </div>
</div>

<div id="recordPanel" class="record-modal">
    <h2 id="studentNameDisplay"></h2>
    <div id="monthGrid"></div>
    <button onclick="document.getElementById('recordPanel').style.display='none'">বন্ধ করুন</button>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function updateDashboard() {
    let totalColl = 0;
    students.forEach(s => {
        for(let m in s.monthsData) totalColl += Number(s.monthsData[m].amount);
    });
    document.getElementById("totalStudents").innerText = students.length;
    document.getElementById("totalCollection").innerText = totalColl + " ৳";
}

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
    if(id === 'dashboardSection') updateDashboard();
}

function loadTable() {
    let table = document.getElementById("studentTable");
    table.innerHTML = `<tr><th>নাম</th><th>পিতা</th><th>মোবাইল</th><th>অ্যাকশন</th></tr>`;
    students.forEach((s, i) => {
        table.innerHTML += `<tr><td>${s.name}</td><td>${s.father}</td><td>${s.mobile}</td>
        <td><button onclick="viewRecords(${i})">Records</button><button onclick="deleteStudent(${i})">Del</button></td></tr>`;
    });
    updateDashboard();
}

document.getElementById("studentForm").addEventListener("submit", (e) => {
    e.preventDefault();
    students.push({
        name: document.getElementById("name").value,
        father: document.getElementById("father").value,
        mobile: document.getElementById("mobile").value,
        fee: document.getElementById("fee").value,
        monthsData: {}
    });
    localStorage.setItem("students", JSON.stringify(students));
    e.target.reset();
    loadTable();
});

function viewRecords(index) {
    currentStudentIndex = index;
    let s = students[index];
    document.getElementById("studentNameDisplay").innerText = s.name;
    let grid = document.getElementById("monthGrid");
    grid.innerHTML = "";
    ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"].forEach(m => {
        let val = s.monthsData[m] ? s.monthsData[m].amount : 0;
        grid.innerHTML += `<div>${m}: <input type="number" value="${val}" onchange="savePayment('${m}', this.value)"> ৳</div>`;
    });
    document.getElementById("recordPanel").style.display = "block";
}

function savePayment(month, amount) {
    if(!students[currentStudentIndex].monthsData) students[currentStudentIndex].monthsData = {};
    students[currentStudentIndex].monthsData[month] = { amount: amount };
    localStorage.setItem("students", JSON.stringify(students));
    updateDashboard();
}

function deleteStudent(i) { students.splice(i, 1); localStorage.setItem("students", JSON.stringify(students)); loadTable(); }

window.onload = loadTable;
</script>
</body>
</html>
