<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confidence Coaching Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f5f7fb; }
        header { background:#0d6efd; color:white; padding:20px; text-align:center; }
        nav { background:#084298; display:flex; justify-content:center; flex-wrap:wrap; }
        nav a { color:white; padding:15px; text-decoration:none; cursor:pointer; }
        nav a:hover { background:#0d6efd; }
        .container { width:95%; margin:20px auto; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.15); margin-bottom:20px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
        .box { background:#0d6efd; color:white; padding:20px; border-radius:10px; text-align:center; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        table th, table td { border:1px solid #ddd; padding:10px; text-align:center; }
        table th { background:#0d6efd; color:white; }
        .btn-group { display:flex; gap:5px; justify-content:center; }
        .section { display: none; }
        .filter-btn { padding: 8px 15px; margin-right: 8px; cursor: pointer; background: #0d6efd; color: white; border: none; border-radius: 5px; }
        
        /* রেকর্ড প্যানেল স্টাইল */
        .record-modal { display:none; position:fixed; top:10%; left:10%; width:80%; max-height:80%; overflow-y:auto; background:white; padding:20px; border:2px solid #0d6efd; z-index:1000; border-radius:10px; }
        .month-btn { padding:10px; margin:5px; border:none; cursor:pointer; color:white; border-radius:5px; width:45%; }
    </style>
</head>
<body>

<header><h1>Confidence Coaching Management System</h1></header>
<nav>
    <a onclick="showSection('dashboardSection')">Dashboard</a>
    <a onclick="showSection('studentsSection')">Students</a>
    <a onclick="showSection('feeSection')">Fee</a>
</nav>

<div class="container">
    <div id="dashboardSection" class="section" style="display:block;">
        <div class="grid">
            <div class="box"><h2>Total Students</h2><h1 id="totalStudents">0</h1></div>
            <div class="box"><h2>Total Collection</h2><h1 id="totalCollection">0 ৳</h1></div>
            <div class="box"><h2>Total Due</h2><h1 id="totalDue">0 ৳</h1></div>
        </div>
        <div class="card" style="margin-top:20px;">
            <button onclick="downloadPDF()" style="padding:10px; background:#28a745; color:white; border:none;">PDF রিপোর্ট ডাউনলোড</button>
        </div>
    </div>

    <div id="studentsSection" class="section">
        <div class="card">
            <h2>শিক্ষার্থী যোগ করুন</h2>
            <form id="studentForm" style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
                <input type="text" id="name" placeholder="নাম" required>
                <input type="text" id="father" placeholder="পিতার নাম">
                <input type="text" id="mobile" placeholder="মোবাইল">
                <input type="text" id="cls" placeholder="ক্লাস">
                <input type="number" id="fee" placeholder="বেতন">
                <button type="submit" style="background:#0d6efd; color:white; border:none; padding:10px;">সংরক্ষণ করুন</button>
            </form>
            <hr style="margin:20px 0;">
            <input type="text" id="search" placeholder="সার্চ করুন..." onkeyup="loadTable()" style="width:100%; padding:10px;">
            <div style="margin-top:10px;">
                <button class="filter-btn" onclick="filterTable('All')">সব</button>
                <button class="filter-btn" onclick="filterTable('Paid')" style="background:#28a745;">Paid</button>
                <button class="filter-btn" onclick="filterTable('Due')" style="background:#dc3545;">Due</button>
            </div>
            <table id="studentTable"></table>
        </div>
    </div>

    <div id="feeSection" class="section">
        <div class="card">
            <h2>💰 বেতন গ্রহণ</h2>
            <select id="feeStudent" style="width:100%; padding:10px;"></select><br><br>
            <button onclick="collectFee()" style="width:100%; padding:10px; background:#28a745; color:white; border:none;">পেমেন্ট সম্পন্ন করুন</button>
        </div>
    </div>
</div>

<div id="recordPanel" class="record-modal">
    <h2 id="studentNameDisplay"></h2>
    <div id="monthGrid"></div>
    <button onclick="document.getElementById('recordPanel').style.display='none'" style="margin-top:15px; padding:10px; background:#6c757d; color:white; border:none;">বন্ধ করুন</button>
</div>

<script>
let currentFilter = 'All';
let currentStudentIndex = -1;
const form = document.getElementById("studentForm");

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function loadTable() {
    let students = JSON.parse(localStorage.getItem("students")) || [];
    let search = document.getElementById("search").value.toLowerCase();
    let table = document.getElementById("studentTable");
    
    table.innerHTML = `<tr><th>নাম</th><th>মোবাইল</th><th>স্ট্যাটাস</th><th>অ্যাকশন</th></tr>`;
    
    students.forEach((s, i) => {
        if ((currentFilter === 'All' || s.status === currentFilter) && (s.name.toLowerCase().includes(search))) {
            table.innerHTML += `<tr><td>${s.name}</td><td>${s.mobile}</td><td>${s.status}</td>
            <td class="btn-group">
                <button onclick="viewRecords(${i})">View Records</button>
                <button onclick="deleteStudent(${i})">Del</button>
            </td></tr>`;
        }
    });
    
    let coll = 0, due = 0;
    students.forEach(s => s.status == "Paid" ? coll += Number(s.fee) : due += Number(s.fee));
    document.getElementById("totalStudents").innerText = students.length;
    document.getElementById("totalCollection").innerText = coll + " ৳";
    document.getElementById("totalDue").innerText = due + " ৳";
    
    let select = document.getElementById("feeStudent");
    select.innerHTML = '<option value="">শিক্ষার্থী নির্বাচন করুন</option>';
    students.forEach((s, i) => select.innerHTML += `<option value="${i}">${s.name}</option>`);
}

function viewRecords(index) {
    currentStudentIndex = index;
    let students = JSON.parse(localStorage.getItem("students"));
    let s = students[index];
    document.getElementById("studentNameDisplay").innerText = "রেকর্ড: " + s.name;
    let grid = document.getElementById("monthGrid");
    grid.innerHTML = "";
    let months = ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"];
    
    months.forEach(m => {
        let status = s.monthsData ? (s.monthsData[m] || "Due") : "Due";
        let color = status === "Paid" ? "green" : "red";
        grid.innerHTML += `<button class="month-btn" style="background:${color}" onclick="toggleMonth('${m}')">${m}: ${status}</button>`;
    });
    document.getElementById("recordPanel").style.display = "block";
}

function toggleMonth(month) {
    let students = JSON.parse(localStorage.getItem("students"));
    if(!students[currentStudentIndex].monthsData) students[currentStudentIndex].monthsData = {};
    let currentStatus = students[currentStudentIndex].monthsData[month] || "Due";
    students[currentStudentIndex].monthsData[month] = (currentStatus === "Paid" ? "Due" : "Paid");
    localStorage.setItem("students", JSON.stringify(students));
    viewRecords(currentStudentIndex);
}

function filterTable(filter) { currentFilter = filter; loadTable(); }

form.addEventListener("submit", (e) => {
    e.preventDefault();
    let students = JSON.parse(localStorage.getItem("students")) || [];
    students.push({
        name: document.getElementById("name").value,
        father: document.getElementById("father").value,
        mobile: document.getElementById("mobile").value,
        cls: document.getElementById("cls").value,
        fee: document.getElementById("fee").value,
        status: "Due",
        monthsData: {}
    });
    localStorage.setItem("students", JSON.stringify(students));
    form.reset(); loadTable();
});

function deleteStudent(i) {
    if(confirm("মুছে ফেলতে চান?")) {
        let s = JSON.parse(localStorage.getItem("students"));
        s.splice(i, 1);
        localStorage.setItem("students", JSON.stringify(s));
        loadTable();
    }
}

function collectFee() {
    let i = document.getElementById("feeStudent").value;
    if(i !== "") { 
        let s = JSON.parse(localStorage.getItem("students"));
        s[i].status = "Paid";
        localStorage.setItem("students", JSON.stringify(s));
        loadTable(); alert("পেমেন্ট সফল!"); 
    }
}

function downloadPDF() {
    const element = document.getElementById('studentTable');
    html2pdf().from(element).save('Student_Report.pdf');
}

window.onload = loadTable;
</script>
</body>
</html>
