<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Confidence Coaching Management System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f5f7fb; }
        header { background:#0d6efd; color:white; padding:20px; text-align:center; }
        nav { background:#084298; display:flex; justify-content:center; flex-wrap:wrap; }
        nav a { color:white; padding:15px; text-decoration:none; cursor:pointer; }
        .container { width:95%; margin:20px auto; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.15); margin-bottom:20px; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        table th, table td { border:1px solid #ddd; padding:10px; text-align:center; }
        table th { background:#0d6efd; color:white; }
        footer { margin-top:30px; background:#0d6efd; color:white; text-align:center; padding:15px; }
        .record-modal { display:none; position:fixed; top:5%; left:10%; width:80%; max-height:90%; overflow-y:auto; background:white; padding:20px; border:2px solid #0d6efd; z-index:1000; border-radius:10px; }
        .month-btn { padding:10px; margin:5px; border:none; cursor:pointer; color:white; border-radius:5px; width:45%; display:inline-block; }
    </style>
</head>
<body>

<header><h1>Confidence Coaching Management System</h1></header>
<nav>
    <a onclick="showSection('dashboardSection')">Dashboard</a>
    <a onclick="showSection('studentsSection')">Students</a>
</nav>

<div class="container">
    <div id="studentsSection" class="card">
        <h2>শিক্ষার্থী তালিকা</h2>
        <button onclick="downloadPDF()">PDF রিপোর্ট ডাউনলোড</button>
        <table id="studentTable"></table>
    </div>
</div>

<div id="recordPanel" class="record-modal">
    <h2 id="studentNameDisplay"></h2>
    <input type="number" id="amountInput" placeholder="টাকার পরিমাণ..." style="width:100%; padding:10px; margin:10px 0;">
    <div id="monthGrid"></div>
    <button onclick="document.getElementById('recordPanel').style.display='none'">বন্ধ করুন</button>
</div>

<footer>© 2026 CONFIDENCE COACHING, PATIYA</footer>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function loadTable() {
    let table = document.getElementById("studentTable");
    table.innerHTML = `<tr><th>নাম</th><th>অ্যাকশন</th></tr>`;
    students.forEach((s, i) => {
        table.innerHTML += `<tr><td>${s.name}</td>
        <td>
            <button onclick="editStudent(${i})">Edit</button>
            <button onclick="deleteStudent(${i})">Delete</button>
            <button onclick="viewRecords(${i})">View Records</button>
        </td></tr>`;
    });
}

function viewRecords(index) {
    let s = students[index];
    document.getElementById("studentNameDisplay").innerText = "রেকর্ড: " + s.name;
    let grid = document.getElementById("monthGrid");
    grid.innerHTML = "";
    ["জানুয়ারি", "ফেব্রুয়ারি", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"].forEach(m => {
        let data = (s.monthsData && s.monthsData[m]) ? s.monthsData[m] : {status: "Due", amount: 0};
        grid.innerHTML += `<button class="month-btn" style="background:${data.status=='Paid'?'green':'red'}" onclick="setPayment('${m}', ${index})">${m} (${data.amount}৳)</button>`;
    });
    document.getElementById("recordPanel").style.display = "block";
}

function setPayment(month, index) {
    let amount = document.getElementById("amountInput").value;
    if(!amount) { alert("টাকা লিখুন!"); return; }
    if(!students[index].monthsData) students[index].monthsData = {};
    students[index].monthsData[month] = { status: "Paid", amount: amount };
    localStorage.setItem("students", JSON.stringify(students));
    viewRecords(index);
}

function deleteStudent(i) { students.splice(i, 1); localStorage.setItem("students", JSON.stringify(students)); loadTable(); }
function downloadPDF() { html2pdf().from(document.getElementById('studentTable')).save(); }

window.onload = loadTable;
</script>
</body>
</html>
