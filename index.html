<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confidence Coaching Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f5f7fb; }
        header { background:#0d6efd; color:white; padding:20px; text-align:center; }
        nav { background:#084298; display:flex; justify-content:center; flex-wrap:wrap; }
        nav a { color:white; padding:15px; text-decoration:none; cursor:pointer; }
        nav a:hover { background:#0d6efd; }
        .container { width:95%; margin:20px auto; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.15); margin-bottom:20px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
        .box { background:#0d6efd; color:white; padding:20px; border-radius:10px; text-align:center; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        table th, table td { border:1px solid #ddd; padding:10px; text-align:center; }
        table th { background:#0d6efd; color:white; }
        .btn-group { display:flex; gap:5px; justify-content:center; }
        .section { display: none; }
        
        /* কালারফুল ফিল্টার বাটন স্টাইল */
        .filter-btn { 
            padding: 8px 15px; 
            margin-right: 8px; 
            cursor: pointer; 
            background: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            transition: 0.3s;
        }
        .filter-btn:hover { background: #084298; }
    </style>
</head>
<body>

<header><h1>Confidence Coaching Management System</h1></header>
<nav>
    <a onclick="showSection('dashboardSection')">Dashboard</a>
    <a onclick="showSection('studentsSection')">Students</a>
    <a onclick="showSection('feeSection')">Fee</a>
</nav>

<div class="container">
    <div id="dashboardSection" class="section" style="display:block;">
        <div class="grid">
            <div class="box"><h2>Total Students</h2><h1 id="totalStudents">0</h1></div>
            <div class="box"><h2>Total Collection</h2><h1 id="totalCollection">0 ৳</h1></div>
            <div class="box"><h2>Total Due</h2><h1 id="totalDue">0 ৳</h1></div>
        </div>
        <div class="card" style="margin-top:20px;">
            <button onclick="downloadPDF()" style="padding:10px; cursor:pointer; background:#28a745; color:white; border:none; border-radius:5px;">PDF রিপোর্ট ডাউনলোড</button>
            <button onclick="exportData()" style="padding:10px; cursor:pointer; background:#6c757d; color:white; border:none; border-radius:5px;">ডাটা ব্যাকআপ (JSON)</button>
        </div>
    </div>

    <div id="studentsSection" class="section">
        <div class="card">
            <h2>শিক্ষার্থী যোগ করুন</h2>
            <form id="studentForm" style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
                <input type="text" id="name" placeholder="নাম" required style="padding:10px;">
                <input type="text" id="father" placeholder="পিতার নাম" style="padding:10px;">
                <input type="text" id="mobile" placeholder="মোবাইল" style="padding:10px;">
                <input type="text" id="cls" placeholder="ক্লাস" style="padding:10px;">
                <input type="number" id="fee" placeholder="বেতন" style="padding:10px;">
                <button type="submit" style="background:#0d6efd; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">সংরক্ষণ করুন</button>
            </form>
            <hr style="margin:20px 0;">
            <input type="text" id="search" placeholder="নাম বা মোবাইল দিয়ে সার্চ করুন..." onkeyup="loadTable()" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ccc;">
            <div style="margin-top:15px;">
                <button class="filter-btn" onclick="filterTable('All')">সব শিক্ষার্থী</button>
                <button class="filter-btn" onclick="filterTable('Paid')" style="background:#28a745;">Paid</button>
                <button class="filter-btn" onclick="filterTable('Due')" style="background:#dc3545;">Due</button>
            </div>
            <table id="studentTable"></table>
        </div>
    </div>

    <div id="feeSection" class="section">
        <div class="card">
            <h2>💰 বেতন গ্রহণ</h2>
            <select id="feeStudent" style="width:100%; padding:10px; margin-top:10px; border-radius:5px;"></select><br><br>
            <button onclick="collectFee()" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer;">পেমেন্ট সম্পন্ন করুন</button>
        </div>
    </div>
</div>

<script>
let currentFilter = 'All';
const form = document.getElementById("studentForm");

function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function loadTable() {
    let students = JSON.parse(localStorage.getItem("students")) || [];
    let search = document.getElementById("search").value.toLowerCase();
    let table = document.getElementById("studentTable");
    
    table.innerHTML = `<tr><th>নাম</th><th>মোবাইল</th><th>ক্লাস</th><th>স্ট্যাটাস</th><th>অ্যাকশন</th></tr>`;
    
    students.forEach((s, i) => {
        if ((currentFilter === 'All' || s.status === currentFilter) && 
            (s.name.toLowerCase().includes(search) || s.mobile.includes(search))) {
            table.innerHTML += `<tr><td>${s.name}</td><td>${s.mobile}</td><td>${s.cls}</td><td>${s.status}</td>
            <td class="btn-group">
                <button onclick="viewStudent(${i})" style="padding:2px 5px;">View</button>
                <button onclick="payFee(${i})" style="padding:2px 5px;">Pay</button>
                <button onclick="deleteStudent(${i})" style="padding:2px 5px;">Del</button>
            </td></tr>`;
        }
    });
    
    let coll = 0, due = 0;
    students.forEach(s => s.status == "Paid" ? coll += Number(s.fee) : due += Number(s.fee));
    document.getElementById("totalStudents").innerText = students.length;
    document.getElementById("totalCollection").innerText = coll + " ৳";
    document.getElementById("totalDue").innerText = due + " ৳";
    
    let select = document.getElementById("feeStudent");
    select.innerHTML = '<option value="">শিক্ষার্থী নির্বাচন করুন</option>';
    students.forEach((s, i) => select.innerHTML += `<option value="${i}">${s.name}</option>`);
}

function filterTable(filter) { currentFilter = filter; loadTable(); }

form.addEventListener("submit", (e) => {
    e.preventDefault();
    let students = JSON.parse(localStorage.getItem("students")) || [];
    students.push({
        name: document.getElementById("name").value,
        father: document.getElementById("father").value,
        mobile: document.getElementById("mobile").value,
        cls: document.getElementById("cls").value,
        fee: document.getElementById("fee").value,
        status: "Due"
    });
    localStorage.setItem("students", JSON.stringify(students));
    form.reset(); loadTable();
});

function viewStudent(i) {
    let s = JSON.parse(localStorage.getItem("students"))[i];
    alert(`নাম: ${s.name}\nপিতা: ${s.father}\nমোবাইল: ${s.mobile}\nক্লাস: ${s.cls}\nবেতন: ${s.fee}৳\nস্ট্যাটাস: ${s.status}`);
}

function payFee(i) {
    let s = JSON.parse(localStorage.getItem("students"));
    s[i].status = "Paid";
    localStorage.setItem("students", JSON.stringify(s));
    loadTable();
}

function deleteStudent(i) {
    if(confirm("মুছে ফেলতে চান?")) {
        let s = JSON.parse(localStorage.getItem("students"));
        s.splice(i, 1);
        localStorage.setItem("students", JSON.stringify(s));
        loadTable();
    }
}

function collectFee() {
    let i = document.getElementById("feeStudent").value;
    if(i !== "") { payFee(i); alert("পেমেন্ট সফল!"); }
    else { alert("শিক্ষার্থী নির্বাচন করুন"); }
}

function downloadPDF() {
    const element = document.getElementById('studentTable');
    html2pdf().from(element).set({ margin: 1, filename: 'Student_Report.pdf', html2canvas: { scale: 2 } }).save();
}

function exportData() {
    let data = localStorage.getItem("students");
    let blob = new Blob([data], {type: "application/json"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url; a.download = "backup.json"; a.click();
}

window.onload = loadTable;
</script>
</body>
</html>
