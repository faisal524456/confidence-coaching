<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confidence Coaching Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f5f7fb; }
        header { background:#0d6efd; color:white; padding:20px; text-align:center; }
        nav { background:#084298; display:flex; justify-content:center; flex-wrap:wrap; }
        nav a { color:white; padding:15px; text-decoration:none; cursor:pointer; }
        nav a:hover { background:#0d6efd; }
        .container { width:95%; margin:20px auto; }
        .card { background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.15); margin-bottom:20px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px; }
        .box { background:#0d6efd; color:white; padding:20px; border-radius:10px; text-align:center; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        table th, table td { border:1px solid #ddd; padding:10px; text-align:center; }
        table th { background:#0d6efd; color:white; }
        .btn-group { display:flex; gap:5px; justify-content:center; }
        .section { display: none; }
        .filter-btn { padding:8px; margin-right:5px; cursor:pointer; background:#eee; border:none; border-radius:5px; }
    </style>
</head>
<body>

<header><h1>Confidence Coaching Management System</h1></header>
<nav>
    <a onclick="showSection('dashboardSection')">Dashboard</a>
    <a onclick="showSection('studentsSection')">Students</a>
    <a onclick="showSection('feeSection')">Fee</a>
</nav>

<div class="container">
    <div id="dashboardSection" class="section" style="display:block;">
        <div class="grid">
            <div class="box"><h2>Total Students</h2><h1 id="totalStudents">0</h1></div>
            <div class="box"><h2>Total Collection</h2><h1 id="totalCollection">0 ৳</h1></div>
            <div class="box"><h2>Total Due</h2><h1 id="totalDue">0 ৳</h1></div>
        </div>
        <div class="card" style="margin-top:20px;">
            <button onclick="downloadPDF()" style="padding:10px; cursor:pointer;">PDF রিপোর্ট ডাউনলোড করুন</button>
            <button onclick="exportData()" style="padding:10px; cursor:pointer;">ডাটা ব্যাকআপ (JSON)</button>
        </div>
    </div>

    <div id="studentsSection" class="section">
        <div class="card">
            <h2>শিক্ষার্থী যোগ করুন</h2>
            <form id="studentForm" style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
                <input type="text" id="name" placeholder="নাম" required>
                <input type="text" id="father" placeholder="পিতার নাম">
                <input type="text" id="mobile" placeholder="মোবাইল">
                <input type="text" id="cls" placeholder="ক্লাস">
                <input type="number" id="fee" placeholder="বেতন">
                <button type="submit" style="background:#0d6efd; color:white; border:none; padding:10px; border-radius:5px;">সংরক্ষণ করুন</button>
            </form>
            <hr style="margin:20px 0;">
            <input type="text" id="search" placeholder="নাম বা মোবাইল দিয়ে সার্চ করুন..." onkeyup="loadTable()" style="width:100%; padding:10px;">
            <div style="margin-top:10px;">
                <button class="filter-btn" onclick="filterTable('All')">সব</button>
                <button class="filter-btn" onclick="filterTable('Paid')">Paid</button>
                <button class="filter-btn" onclick="filterTable('Due')">Due</button>
            </div>
            <table id="studentTable"></table>
        </div>
    </div>

    <div id="feeSection" class="section">
        <div class="card">
            <h2>💰 বেতন গ্রহণ</h2>
            <select id="feeStudent" style="width:100%; padding:10
